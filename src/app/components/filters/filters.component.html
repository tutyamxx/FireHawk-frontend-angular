<div class="filters">
    <mat-form-field appearance="outline">
        <mat-label>Make</mat-label>
        <input matInput [(ngModel)]="filters.make" (input)="update()" />
    </mat-form-field>

    <mat-form-field appearance="outline">
        <mat-label>Origin</mat-label>
        <input matInput [(ngModel)]="filters.origin" (input)="update()" />
    </mat-form-field>

    <mat-form-field appearance="outline">
        <mat-label>Cylinders</mat-label>
        <mat-select [(ngModel)]="filters.cylinders" (selectionChange)="update()">
            <mat-option value="">All Cylinders</mat-option>
            <mat-option value="4">4</mat-option>
            <mat-option value="6">6</mat-option>
            <mat-option value="8">8</mat-option>
        </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline">
        <mat-label>Efficiency</mat-label>
        <mat-select [(ngModel)]="filters.efficiency" (selectionChange)="update()">
            <mat-option value="">All Efficiency</mat-option>
            <mat-option value="High">High</mat-option>
            <mat-option value="Medium">Medium</mat-option>
            <mat-option value="Low">Low</mat-option>
        </mat-select>
    </mat-form-field>
</div>
